kind = "web"
previewPath = "/"
title = "Kuaishou Video Downloader"
version = "1.0.0"
id = "artifacts/kuaishou-downloader"
router = "path"

[[integratedSkills]]
name = "react-vite"
version = "1.0.0"

[[services]]
name = "web"
paths = [ "/" ]
localPort = 23282

[services.development]
run = "pnpm --filter @workspace/kuaishou-downloader run dev"

[services.production]
build = [ "pnpm", "--filter", "@workspace/kuaishou-downloader", "run", "build" ]
publicDir = "artifacts/kuaishou-downloader/dist/public"
serve = "static"

[[services.production.rewrites]]
from = "/*"
to = "/index.html"

[services.env]
PORT = "23282"
BASE_PATH = "/"
